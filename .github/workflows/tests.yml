name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: |
            10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Install Kiota CLI
        run: dotnet tool install -g Microsoft.OpenApi.Kiota

      - name: Restore dependencies
        run: dotnet restore Scalar.Kiota.Extension.slnx

      - name: Build
        run: dotnet build Scalar.Kiota.Extension.slnx --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet tool install --global dotnet-coverage || true

          # Run tests with coverage - ONLY the main project assembly
          dotnet-coverage collect \
            --include-files "${{ github.workspace }}/Scalar.Kiota.Extension/bin/Release/net10.0/Scalar.Kiota.Extension.dll" \
            --output ${{ github.workspace }}/coverage.cobertura.xml \
            --output-format cobertura \
            -- dotnet run --project Scalar.Kiota.Extension.Tests/Scalar.Kiota.Extension.Tests.csproj --configuration Release

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ${{ github.workspace }}/coverage.cobertura.xml
          fail_ci_if_error: false
          verbose: true
